name: Modify Kwrt Firmware to Router Mode

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: 'Kwrt/OpenWrt 固件下载链接'
        required: true
        default: 'https://media.githubusercontent.com/media/liem0352/xiaomi-r3d-router-firmware/main/kwrt-02.22.2026-ipq806x-generic-xiaomi_r3d-squashfs-sysupgrade.bin'

env:
  OUTPUT_FIRMWARE: "kwrt-02.22.2026-r3d-router-mode-sysupgrade.bin"

jobs:
  modify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y squashfs-tools tar wget curl gzip xz-utils

    - name: Download Firmware
      run: |
        echo "========================================"
        echo "下载固件"
        echo "========================================"
        
        wget -O original.bin "${{ github.event.inputs.firmware_url }}"
        
        echo ""
        echo "固件信息:"
        ls -lh original.bin
        file original.bin

    - name: Extract Firmware
      run: |
        echo ""
        echo "========================================"
        echo "提取固件"
        echo "========================================"
        
        mkdir -p firmware_work
        cd firmware_work
        
        cp ../original.bin .
        
        echo "解压 tar 归档..."
        tar -xf original.bin
        
        echo ""
        echo "文件列表:"
        ls -la

    - name: Extract SquashFS
      run: |
        echo ""
        echo "========================================"
        echo "解压 SquashFS"
        echo "========================================"
        
        cd firmware_work
        
        echo "检查目录结构:"
        ls -la
        
        mkdir -p rootfs
        
        echo "解压 squashfs..."
        unsquashfs -f -d rootfs sysupgrade-xiaomi_r3d/root
        
        echo ""
        echo "检查 rootfs:"
        ls -la rootfs/

    - name: Modify Network Config
      run: |
        echo ""
        echo "========================================"
        echo "修改网络配置为路由模式"
        echo "========================================"
        
        cd firmware_work
        
        if [ -f rootfs/etc/config/network ]; then
            cp rootfs/etc/config/network rootfs/etc/config/network.backup
        fi
        
        cat > rootfs/etc/config/network << 'EOF'
config interface 'loopback'
	option device 'lo'
	option proto 'static'
	option ipaddr '127.0.0.1'
	option netmask '255.0.0.0'

config globals 'globals'
	option ula_prefix 'auto'

config interface 'wan'
	option device 'eth0'
	option proto 'dhcp'
	option ipv6 'auto'

config interface 'wan6'
	option device '@wan'
	option proto 'dhcpv6'

config interface 'lan'
	option device 'br-lan'
	option proto 'static'
	option ipaddr '192.168.1.1'
	option netmask '255.255.255.0'
	option ip6assign '60'

config device
	option name 'br-lan'
	option type 'bridge'
	list ports 'eth1'
	list ports 'eth2'
	list ports 'eth3'

config dhcp 'lan'
	option interface 'lan'
	option start '100'
	option limit '150'
	option leasetime '12h'

config dhcp 'wan'
	option interface 'wan'
	option ignore '1'
EOF
        
        echo "✓ 网络配置已修改"

    - name: Modify Firewall Config
      run: |
        echo ""
        echo "========================================"
        echo "修改防火墙配置"
        echo "========================================"
        
        cd firmware_work
        
        if [ -f rootfs/etc/config/firewall ]; then
            cp rootfs/etc/config/firewall rootfs/etc/config/firewall.backup
        fi
        
        cat > rootfs/etc/config/firewall << 'EOF'
config defaults
	option syn_flood '1'
	option input 'REJECT'
	option output 'ACCEPT'
	option forward 'REJECT'

config zone
	option name 'lan'
	list network 'lan'
	option input 'ACCEPT'
	option output 'ACCEPT'
	option forward 'ACCEPT'

config zone
	option name 'wan'
	list network 'wan'
	list network 'wan6'
	option input 'REJECT'
	option output 'ACCEPT'
	option forward 'REJECT'
	option masq '1'
	option mtu_fix '1'

config forwarding
	option src 'lan'
	option dest 'wan'
EOF
        
        echo "✓ 防火墙配置已修改"

    - name: Add First Boot Script
      run: |
        echo ""
        echo "========================================"
        echo "添加首次启动脚本"
        echo "========================================"
        
        cd firmware_work
        
        mkdir -p rootfs/etc/uci-defaults
        
        cat > rootfs/etc/uci-defaults/99-router-mode << 'SCRIPT'
#!/bin/sh
sleep 3

if [ ! -f /etc/.router_mode_configured ]; then
    echo "[Router Mode] Configuring..."
    
    uci set system.@system[0].hostname='Xiaomi-R3D-Router'
    uci set system.@system[0].timezone='CST-8'
    uci set system.@system[0].zonename='Asia/Shanghai'
    
    uci set network.wan=interface
    uci set network.wan.proto='dhcp'
    uci set network.wan.device='eth0'
    
    uci set network.lan.proto='static'
    uci set network.lan.ipaddr='192.168.1.1'
    uci set network.lan.netmask='255.255.255.0'
    uci set network.lan.device='br-lan'
    
    uci set dhcp.lan.ignore='0'
    uci set dhcp.lan.start='100'
    uci set dhcp.lan.limit='150'
    uci set dhcp.lan.leasetime='12h'
    
    uci set firewall.@zone[1].masq='1'
    
    if [ -f /etc/config/wireless ]; then
        uci set wireless.radio0.disabled='0'
        uci set wireless.radio1.disabled='0'
        uci set wireless.@wifi-iface[0].ssid='Xiaomi_R3D_5G'
        uci set wireless.@wifi-iface[0].encryption='psk2'
        uci set wireless.@wifi-iface[0].key='12345678'
        uci set wireless.@wifi-iface[1].ssid='Xiaomi_R3D_2.4G'
        uci set wireless.@wifi-iface[1].encryption='psk2'
        uci set wireless.@wifi-iface[1].key='12345678'
        uci commit wireless
    fi
    
    uci commit system
    uci commit network
    uci commit dhcp
    uci commit firewall
    
    passwd -d root
    touch /etc/.router_mode_configured
    
    /etc/init.d/network restart
    /etc/init.d/firewall restart
    
    echo "[Router Mode] Configuration complete!"
fi
SCRIPT
        
        chmod +x rootfs/etc/uci-defaults/99-router-mode
        
        echo "✓ 首次启动脚本已添加"

    - name: Repack Firmware
      run: |
        echo ""
        echo "========================================"
        echo "重新打包固件"
        echo "========================================"
        
        cd firmware_work
        
        echo "打包新的 rootfs..."
        mksquashfs rootfs new_rootfs.squashfs -comp xz -b 262144
        
        echo ""
        echo "文件大小:"
        ls -lh new_rootfs.squashfs
        
        echo ""
        echo "创建 sysupgrade 目录..."
        mkdir -p sysupgrade-xiaomi_r3d
        mv new_rootfs.squashfs sysupgrade-xiaomi_r3d/root
        
        echo ""
        echo "创建新的固件..."
        tar -cf "../$OUTPUT_FIRMWARE" sysupgrade-xiaomi_r3d/
        
        cd ..
        
        echo ""
        echo "✓ 固件重新打包完成"
        ls -lh "$OUTPUT_FIRMWARE"

    - name: Generate Checksum
      run: |
        echo ""
        echo "========================================"
        echo "生成校验文件"
        echo "========================================"
        
        sha256sum "$OUTPUT_FIRMWARE" > "${OUTPUT_FIRMWARE}.sha256"
        
        echo "SHA256:"
        cat "${OUTPUT_FIRMWARE}.sha256"

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: kwrt-router-mode-firmware
        path: |
          ${{ env.OUTPUT_FIRMWARE }}
          ${{ env.OUTPUT_FIRMWARE }}.sha256
        retention-days: 30

    - name: Summary
      run: |
        echo ""
        echo "========================================"
        echo "修改完成!"
        echo "========================================"
        ls -lh "$OUTPUT_FIRMWARE"
        cat "${OUTPUT_FIRMWARE}.sha256"
